<div class="dashboard-container">
  <div class="navbar glass" *ngIf="showNavbar">
    <div class="logo" routerLink="/dashboard">
      <i class="bi bi-laptop"></i>
      <span>QDIS</span>
    </div>
    <div class="nav-title">Q Digit Info Systems</div>
    <div class="nav-links">
      <!-- Dashboard - Everyone -->
      <button routerLink="/dashboard" routerLinkActive="active" data-tooltip="Main Dashboard">
        <i class="bi bi-speedometer2"></i>
        <span>Dashboard</span>
      </button>

      <!-- CLIENT PORTAL - For regular users (clients) -->
      <button 
        *ngIf="role === 'software developer'"
        routerLink="/client-portal" 
        routerLinkActive="active"
        data-tooltip="View and manage your tickets">
        <i class="bi bi-ticket-perforated"></i>
        <span>My Tickets</span>
      </button>

      <!-- ADMIN PORTAL - For Admin & Software Developer -->
      <button 
        *ngIf="role === 'admin' || role === 'software developer'"
        routerLink="/admin-portal" 
        routerLinkActive="active"
        data-tooltip="Full admin control and analytics">
        <i class="bi bi-speedometer2"></i>
        <span>Admin Portal</span>
      </button>

      <!-- Emp PORTAL - For Admin & Software Developer -->
      <button
*ngIf="
role==='technician' ||
role==='support engineer' ||
role==='tech support' ||
role==='software developer'
"
routerLink="/employee-portal"
routerLinkActive="active">

<i class="bi bi-person-workspace"></i>

<span>Employee Portal</span>

</button>

      <!-- Assets Entry - Admin & Software Developer -->
      <button 
        *ngIf="role === 'admin' || role === 'software developer'"
        routerLink="/assets" 
        routerLinkActive="active"
        data-tooltip="Manage hardware assets">
        <i class="bi bi-hdd-stack"></i>
        <span>Assets Enter</span>
      </button>

<!-- Notification Bell -->
<div class="notification-bell" (click)="toggleNotifications()">
  <i class="bi bi-bell-fill"></i>

  <span class="notification-count" *ngIf="newTicketCount > 0">
    {{ newTicketCount }}
  </span>

  <!-- Popup -->
  <div class="notification-popup" *ngIf="showNotifications">

  <!-- Header -->
  <div class="popup-header">
    <h4>Notifications</h4>

    <button class="clear-btn" (click)="clearNotifications()">
      Clear
    </button>
  </div>

  <!-- Notification Items -->
  <div class="notification-item" *ngIf="newTicketCount > 0">

    <i class="bi bi-ticket-perforated-fill notification-icon"></i>

    <div class="notification-content">
      <strong>New Support Ticket</strong>

      <p>
        {{ newTicketCount }} new ticket(s) received.
      </p>

      <small>Just now</small>
    </div>

  </div>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="newTicketCount === 0">
    📭 No new notifications
  </div>

</div>
</div>

      <!-- Logout Button -->
      <button class="logout" (click)="logout()" data-tooltip="Sign out from system">
        <i class="bi bi-box-arrow-right"></i>
        <span>Logout</span>
      </button>

        <div class="user-profile-badge" *ngIf="role">
    <i class="bi bi-person-circle"></i>
    <span class="user-role">{{ role | titlecase }}</span>
  </div>
    </div>
  </div>
  

  
  <router-outlet></router-outlet>
</div>
