 <!-- login.component.html -->
<div class="login-wrapper">
  <!-- Particle Background -->
  <div class="particles-bg"></div>
  
  <!-- 3D Floating Morphing Shapes -->
  <div class="floating-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
  </div>

  <!-- Live Status Badge -->
  <div class="status-badge">
    <div class="status-content">
      <i class="bi bi-shield-check"></i>
      <span>SECURE CONNECTION • V 3.0</span>
      <div class="pulse-dot"></div>
    </div>
  </div>

  <div class="login-card">
    <div class="login-header">
      <div class="brand-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 class="welcome-title">Welcome Back</h1>
      <p class="welcome-subtitle">Sign in to continue to your account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="auth-form">
      <!-- User ID Field -->
      <div class="form-floating mb-4">
        <input 
          type="text" 
          class="form-control" 
          id="userId" 
          formControlName="userID"
          [class.is-invalid]="loginForm.get('userID')?.invalid && loginForm.get('userID')?.touched"
          placeholder=" ">
        <label for="userId">
          <i class="bi bi-person"></i> User ID
        </label>
        <div class="input-glow"></div>
        <div class="invalid-feedback">
          <i class="bi bi-exclamation-triangle-fill"></i> Please enter your User ID
        </div>
      </div>

      <!-- Password Field with Eye Toggle -->
      <div class="form-floating mb-4 password-field">
        <input 
          [type]="showPassword ? 'text' : 'password'" 
          class="form-control" 
          id="password" 
          formControlName="password"
          [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          placeholder=" ">
        <label for="password">
          <i class="bi bi-lock"></i> Password
        </label>
        <button 
          type="button" 
          class="password-toggle" 
          (click)="togglePasswordVisibility()"
          [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
          <i [class]="showPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
        </button>
        <div class="input-glow"></div>
        <div class="invalid-feedback">
          <i class="bi bi-exclamation-triangle-fill"></i> Password is required
        </div>
      </div>

      <!-- Login Button with Loading Spinner & Animation -->
      <button 
        type="submit" 
        class="btn btn-login w-100" 
        [disabled]="loginForm.invalid || isLoading"
        [class.btn-clicked]="isClicked"
        [class.loading]="isLoading">
        <span class="btn-text" *ngIf="!isLoading">
          <i class="bi bi-box-arrow-in-right"></i> LOGIN
        </span>
        <span class="btn-text" *ngIf="isLoading">
          <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
          AUTHENTICATING...
        </span>
      </button>
    </form>


  </div>
</div>
