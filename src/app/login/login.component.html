<div class="login-page">

  <!-- ambient AR background -->
  <div class="bg-aurora" aria-hidden="true">
    <span class="orb orb-cyan"></span>
    <span class="orb orb-violet"></span>
    <span class="orb orb-emerald"></span>
    <div class="grid-overlay"></div>
    <div class="scan-line"></div>
  </div>

  <div class="login-shell">

    <!-- ===================== BRAND PANEL ===================== -->
  <aside class="brand-panel">

    <div class="brand-mark">
      <svg viewBox="0 0 40 40" fill="none">
        <path d="M20 3 L35 11 V29 L20 37 L5 29 V11 Z"
              stroke="currentColor"
              stroke-width="2"/>
      </svg>
      <span>QDIS</span>
    </div>

    <div class="brand-center">

      <img src="../.././assets/img/QDlogo.png"
           alt="QD Logo"
           class="qd-logo">

      

      <p class="brand-sub">
        One console for IT asset tracking,
        support tickets, and field operations.
      </p>

      <div class="brand-divider"></div>

      <ul class="brand-features">
        <li>
          <i class="bi bi-shield-check"></i>
          <span>Role-based secure access</span>
        </li>

        <li>
          <i class="bi bi-graph-up-arrow"></i>
          <span>Real-time ticket tracking</span>
        </li>

        <li>
          <i class="bi bi-hdd-stack"></i>
          <span>Full asset lifecycle management</span>
        </li>
      </ul>

    </div>

  </aside>

    <!-- ===================== LOGIN PANEL ===================== -->
    <section class="login-panel">
      <div class="login-card-header">
        <div class="login-icon">
          <i class="bi bi-shield-lock"></i>
          <span class="icon-ring"></span>
        </div>
        <h2>Welcome Back</h2>
        <p>Sign in to continue to your console</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="auth-form">
        <!-- User ID Field -->
        <div class="form-floating mb-4">
          <input 
            type="text" 
            class="form-control" 
            id="userId" 
            formControlName="userID"
            [class.is-invalid]="loginForm.get('userID')?.invalid && loginForm.get('userID')?.touched"
            placeholder=" ">
          <label for="userId">
            <i class="bi bi-person"></i> User ID
          </label>
          <div class="input-glow"></div>
          <div class="invalid-feedback">
            <i class="bi bi-exclamation-triangle-fill"></i> Please enter your User ID
          </div>
        </div>

        <!-- Password Field with Eye Toggle -->
        <div class="form-floating mb-4 password-field">
          <input 
            [type]="showPassword ? 'text' : 'password'" 
            class="form-control" 
            id="password" 
            formControlName="password"
            [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            placeholder=" ">
          <label for="password">
            <i class="bi bi-lock"></i> Password
          </label>
          <button 
            type="button" 
            class="password-toggle" 
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
            <i [class]="showPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
          </button>
          <div class="input-glow"></div>
          <div class="invalid-feedback">
            <i class="bi bi-exclamation-triangle-fill"></i> Password is required
          </div>
        </div>

        <!-- Login Button with Loading Spinner & Animation -->
        <button 
          type="submit" 
          class="btn btn-login w-100" 
          [disabled]="loginForm.invalid || isLoading"
          [class.btn-clicked]="isClicked"
          [class.loading]="isLoading">
          <span class="btn-text" *ngIf="!isLoading">
            <i class="bi bi-box-arrow-in-right"></i> LOGIN
          </span>
          <span class="btn-text" *ngIf="isLoading">
            <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
            AUTHENTICATING...
          </span>
        </button>
      </form>

      <div class="login-footer">
        <a href="#" class="forgot-link">Forgot your password?</a>
      </div>
    </section>

  </div>
</div>
