<div class="assetscreen-shell">

  <!-- ambient AR background -->
  <div class="bg-aurora" aria-hidden="true">
    <span class="orb orb-cyan"></span>
    <span class="orb orb-violet"></span>
    <div class="grid-overlay"></div>
    <div class="scan-line"></div>
  </div>

  <main class="main-content">

    <!-- ===================== HEADING ===================== -->
 <header class="page-heading">

  <div class="heading-left">
    <div class="heading-icon">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 3l8 4.5v9L12 21l-8-4.5v-9z"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linejoin="round"/>
        <path d="M12 3v18M4 7.5l8 4.5 8-4.5"
              stroke="currentColor"
              stroke-width="1.2"
              opacity="0.6"/>
      </svg>
      <span class="icon-ring"></span>
    </div>

    <div>
      <span class="heading-eyebrow">Asset Management</span>
      <h1 class="heading-title">Assets Screen</h1>
    </div>
  </div>

  <div class="excel-import">
    <input
    #fileInput
    type="file"
    hidden
    accept=".xlsx,.xls"
    (change)="onFileSelected($event)">


    <button
    type="button"
    class="btn-upload"
    (click)="fileInput.click()">
    📄 Choose Excel
  </button>

  <div class="file-name" *ngIf="selectedFileName">
  {{ selectedFileName }}
</div>

    <button
      type="button"
      class="btn-create"
      (click)="importExcel()">
      ⬆ Import
    </button>
  </div>

</header>

    <!-- ===================== TAB CARD ===================== -->
    <section class="form-card glass tilt-card hud-card" (mousemove)="onTiltMove($event)" (mouseleave)="onTiltLeave($event)">

      <div class="tab-rail"
           [class.is-rental]="activeTab === 'rental'"
           [class.is-repair]="activeTab === 'repair'"
           [class.is-replacement]="activeTab === 'replacement'">
        <button class="tab-slot" [class.active]="activeTab === 'rental'" (click)="switchTab('rental')">Rental / New</button>
        <button class="tab-slot" [class.active]="activeTab === 'repair'" (click)="switchTab('repair')">Repair / Rework</button>
        <button class="tab-slot" [class.active]="activeTab === 'replacement'" (click)="switchTab('replacement')">Replacement</button>
        <div class="reader-light"></div>
      </div>

      <div class="panel-stage">

        <!-- RENTAL / NEW -->
        <form *ngIf="activeTab === 'rental'" [formGroup]="rentalForm" class="tab-panel" (ngSubmit)="onSubmitRental()">
          <div class="form-grid">
            <div class="field">
              <label>Model</label>
              <select formControlName="model">
                <option value="" disabled>Select model</option>
                <option *ngFor="let m of models" [value]="m">{{ m }}</option>
              </select>
            </div>
            <div class="field">
              <label>Serial Number</label>
              <input type="text" formControlName="serialNumber" placeholder="e.g. SN-88231" class="mono" />
            </div>
          </div>

          <div class="form-grid">
            <div class="field">
              <label>Date</label>
              <input type="date" formControlName="date" />
            </div>
            <div class="field">
              <label>Client Name</label>
              <select formControlName="clientName">
                <option value="" disabled>Select client</option>
                <option *ngFor="let c of clients" [value]="c">{{ c }}</option>
              </select>
            </div>
          </div>

          <div class="form-grid">
            <div class="field">
              <label>Status</label>
              <select formControlName="status">
                <option value="" disabled>Select status</option>
                <option *ngFor="let s of statusOptions" [value]="s">{{ s }}</option>
              </select>
            </div>
            <div class="field">
              <label>Specification</label>
              <input type="text" formControlName="specification" placeholder="RAM, storage, display, etc." />
            </div>
          </div>

          <div class="form-grid">
 <div class="field">
  <label>Dispatch Type</label>
  <select formControlName="  dispatchedDetails
">
    <option value="" disabled>Select type</option>
    <option value="courier">Courier</option>
    <option value="porter">Porter</option>
    <option value="handover">Hand Over</option>
  </select>
</div>

<!-- Courier -->
<div class="field" *ngIf="rentalForm.value.  dispatchedType
 === 'courier'">
  <label>Courier Number</label>
  <input type="text" formControlName="courierNumber">
</div>

<!-- Porter -->
<div class="field" *ngIf="rentalForm.value.  dispatchedType
 === 'porter'">
  <label>Invoice Number</label>
  <input type="text" formControlName="invoiceNumber">
</div>

 <div class="field">
  <label>Receiver Details</label>

<select formControlName="reciverDetails">
  <option value="" disabled>Select receiver</option>
  <option *ngFor="let r of receivers" [value]="r">
    {{ r }}
  </option>
</select>

  <input
    type="text"
    formControlName="reciverDetails"
    placeholder="Or type manually / edit selected"
  />
</div>
</div>

<div class="field">
  <label>Location</label>

  <select formControlName="location">
    <option value="" disabled>Select location</option>
    <option *ngFor="let l of locations" [value]="l">{{ l }}</option>
  </select>
</div>

          <div class="form-actions">
            <span class="form-msg success" *ngIf="successMessage">{{ successMessage }}</span>
            <span class="form-msg error" *ngIf="errorMessage">{{ errorMessage }}</span>
            <button type="submit" class="btn-create" [disabled]="submitting">
              {{ submitting ? 'Adding…' : 'Add Asset' }}
            </button>
          </div>
        </form>

        <!-- REPAIR / REWORK -->
        <form *ngIf="activeTab === 'repair'" [formGroup]="repairForm" class="tab-panel" (ngSubmit)="onSubmitRepair()">
          <div class="form-grid">
            <div class="field">
              <label>Model</label>
              <select formControlName="model">
                <option value="" disabled>Select model</option>
                <option *ngFor="let m of models" [value]="m">{{ m }}</option>
              </select>
            </div>
            <div class="field">
              <label>Serial Number</label>
              <select formControlName="serialNumber">
                <option value="" disabled>Select serial number</option>
                <option *ngFor="let s of serialNumbers" [value]="s">{{ s }}</option>
              </select>
            </div>
          </div>

          <div class="form-grid">
            <div class="field">
              <label>Date</label>
              <input type="date" formControlName="date" />
            </div>
            <div class="field">
              <label>Client Name</label>
              <select formControlName="clientName">
                <option value="" disabled>Select client</option>
                <option *ngFor="let c of clients" [value]="c">{{ c }}</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label>Status</label>
            <select formControlName="status">
              <option *ngFor="let s of statusOptions" [value]="s">{{ s }}</option>
              <option value="Repair">Repair</option>
            </select>
          </div>

          <div class="field">
            <label>Issue Description</label>
            <textarea formControlName="issueDescription" rows="3" placeholder="Describe the fault or issue…"></textarea>
          </div>

          <div class="form-actions">
            <span class="form-msg success" *ngIf="successMessage">{{ successMessage }}</span>
            <span class="form-msg error" *ngIf="errorMessage">{{ errorMessage }}</span>
            <button type="submit" class="btn-create" [disabled]="submitting">
              {{ submitting ? 'Logging…' : 'Add Repair' }}
            </button>
          </div>
        </form>

        <!-- REPLACEMENT -->
        <form *ngIf="activeTab === 'replacement'" [formGroup]="replacementForm" class="tab-panel" (ngSubmit)="onSubmitReplacement()">
          <div class="form-grid">
            <div class="field">
              <label>Model</label>
              <select formControlName="model">
                <option value="" disabled>Select model</option>
                <option *ngFor="let m of models" [value]="m">{{ m }}</option>
              </select>
            </div>
            <div class="field">
              <label>Old Serial Number</label>
              <select formControlName="oldSerialNumber">
                <option value="" disabled>Select serial number</option>
                <option *ngFor="let s of serialNumbers" [value]="s">{{ s }}</option>
              </select>
            </div>
          </div>

          <div class="form-grid">
            <div class="field">
              <label>New Serial Number</label>
              <input type="text" formControlName="newSerialNumber" placeholder="e.g. SN-91044" class="mono" />
            </div>
            <div class="field">
              <label>Date</label>
              <input type="date" formControlName="date" />
            </div>
          </div>

          <div class="form-grid">
            <div class="field">
              <label>Client</label>
              <select formControlName="clientName">
                <option value="" disabled>Select client</option>
                <option *ngFor="let c of clients" [value]="c">{{ c }}</option>
              </select>
            </div>
            <div class="field">
              <label>Specification</label>
              <input type="text" formControlName="specification" placeholder="RAM, storage, display, etc." />
            </div>
          </div>

          <div class="form-actions">
            <span class="form-msg success" *ngIf="successMessage">{{ successMessage }}</span>
            <span class="form-msg error" *ngIf="errorMessage">{{ errorMessage }}</span>
            <button type="submit" class="btn-create" [disabled]="submitting">
              {{ submitting ? 'Recording…' : 'Add Replacement' }}
            </button>
          </div>
        </form>

      </div>
    </section>

  </main>
</div>
